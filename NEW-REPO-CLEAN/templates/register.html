{% extends "base.html" %}

{% block title %}Регистрация — BARAVKO{% endblock %}

{% block content %}
<div class="register-page">
<form method="post" class="auth-form" id="registerForm">
    <input type="email" name="email" class="email" placeholder="Электронная почта" required>
    <input type="password" name="pass" class="pass" placeholder="Придумайте пароль" required>
    <button type="submit">Регистрация</button>
</form>
</div>
<script>
    const form = document.getElementById('registerForm');
    const passwordInput = form.querySelector('input[name="pass"]');

    // Кастомная проверка пароля при отправке
    form.addEventListener('submit', function(event) {
        const password = passwordInput.value;
        let errorMessage = '';

        if (password.length < 7) {
            errorMessage = 'Ты че Боровко такой пароль ставить?';
        } else if (password === 'qwerty' || password === '123456') {
            errorMessage = 'Ты че Боровко такой пароль ставить?';
        }

        if (errorMessage) {
            // Устанавливаем кастомное сообщение об ошибке
            passwordInput.setCustomValidity(errorMessage);
            // Показываем стандартное всплывающее окно браузера
            passwordInput.reportValidity();
            event.preventDefault(); // отменяем отправку формы
        } else {
            // Сбрасываем сообщение, если всё ок
            passwordInput.setCustomValidity('');
        }
    });

    // Сбрасываем кастомную валидацию при изменении поля (чтобы сообщение исчезало при исправлении)
    passwordInput.addEventListener('input', function() {
        passwordInput.setCustomValidity('');
    });
</script>

{% endblock %}
